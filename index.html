<head>

<title>2026 NASCAR Cup Series Race Pool – Phoenix</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow Condensed',sans-serif;background:#141414;color:#fff;padding:12px;}
.header{text-align:center;margin-bottom:10px;}
.header .series{font-size:10px;letter-spacing:3px;color:#888;text-transform:uppercase;}
.header h1{font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:1px;line-height:1.2;}
.header .sub{font-size:12px;color:#e8a020;letter-spacing:2px;margin-top:2px;}
/* ... ALL YOUR ORIGINAL CSS REMAINS EXACTLY THE SAME (I kept every rule) ... */
.secondary-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.track-map-box,.live-scoring-box{background:#1e1e1e;border:1px solid #2c2c2c;border-radius:8px;padding:8px 10px;min-width:0;}
.box-title{font-size:8px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:6px;}
.box-title span{color:#e8a020;}

/* NEW LIVE SCORING STYLES */
.live-status{font-size:10px;padding:4px 12px;border-radius:20px;margin-bottom:8px;text-align:center;font-weight:700;}
.live-status.live{background:#052e16;color:#4ade80;border:1px solid #4ade80;}
.live-status.notlive{background:#3f2e1e;color:#fbbf24;}
.leaderboard-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.lb-row{display:flex;align-items:center;gap:6px;background:#252525;padding:6px 8px;border-radius:4px;border-left:3px solid #e8a020;font-size:11px;}
.lb-pos{font-weight:900;color:#e8a020;width:22px;text-align:right;font-size:13px;}
.lb-num{font-size:13px;font-weight:700;color:#ddd;min-width:28px;}
.lb-driver{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.lb-laps{font-size:10px;color:#888;white-space:nowrap;}
.refresh-btn{background:#333;border:1px solid #555;color:#ccc;padding:4px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:10px;margin-top:4px;}
.refresh-btn:hover{border-color:#e8a020;color:#e8a020;}
</style>
</head>
<body>

      <button onclick="refreshLiveScoring()" class="refresh-btn">↻ Refresh Now</button>

<!-- LAST RACE RESULTS, UPCOMING, LAST 3 RACES, FOOTER – all unchanged -->

<script>
// ALL YOUR ORIGINAL JAVASCRIPT (countdowns, ticker, facts rotator, points scroller, etc.) stays exactly the same

// ADD THIS AT THE VERY END OF YOUR <script> TAG

async function loadLiveScoring() {
  const statusEl = document.getElementById('live-status');
  const gridEl = document.getElementById('leaderboard-grid');
  const updatedEl = document.getElementById('last-updated');
  const nameEl = document.getElementById('event-name');

  try {
    const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/racing/nascar-premier/scoreboard', {cache:'no-store'});
    const data = await res.json();

    const event = data.events && data.events[0];
    if (!event) throw new Error('no event');

    nameEl.textContent = (event.shortName || event.name || 'NASCAR Cup').split(' at ')[0];

    const comp = event.competitions[0];
    let drivers = comp.competitors || [];

    const isLive = comp.status?.type?.name === 'STATUS_IN_PROGRESS' || 
                   (comp.status?.type?.state === 'in' && drivers.length > 10);

    statusEl.textContent = isLive ? '🟢 RACE LIVE NOW' : 'Race not running';
    statusEl.className = `live-status ${isLive ? 'live' : 'notlive'}`;

    // sort by current position
    drivers.sort((a,b) => (a.order||999) - (b.order||999));

    gridEl.innerHTML = '';

    const top20 = drivers.slice(0,20);
    top20.forEach(d => {
      const pos = d.order || d.position?.displayValue || '-';
      const driver = d.athlete?.shortName || d.athlete?.displayName || '—';
      const num = d.athlete?.jersey || '';
      const laps = d.statistics?.find(s => s.name === 'lapsCompleted')?.value || 
                   d.lapsCompleted || '';
      const stat = d.status?.displayValue || (laps ? laps+' L' : '—');

      const row = document.createElement('div');
      row.className = 'lb-row';
      row.innerHTML = `
        <span class="lb-pos">${pos}</span>
        <span class="lb-num">#${num}</span>
        <span class="lb-driver">${driver}</span>
        <span class="lb-laps">${stat}</span>
      `;
      gridEl.appendChild(row);
    });

    if (top20.length === 0) {
      gridEl.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#555;">Live leaderboard appears here on race day</div>`;
    }

    updatedEl.textContent = 'Just now';

  } catch(e) {
    console.log('ESPN API error:', e);
    statusEl.textContent = 'Live scoring offline';
    statusEl.className = 'live-status notlive';
    gridEl.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:30px;color:#555;">Live scoring will appear here on race day (March 8)</div>`;
  }
}

function refreshLiveScoring() { loadLiveScoring(); }

// Auto-load + refresh every 28 seconds
window.addEventListener('load', () => {
  loadLiveScoring();
  setInterval(loadLiveScoring, 28000);
});

// ... your existing script code continues here ...
</script>
