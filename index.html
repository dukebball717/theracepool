<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Race Pool</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; background-color: #f4f4f4; color: #222; }
    a { text-decoration: none; color: inherit; }

    /* Header */
    header { 
      background: linear-gradient(90deg, #1e3c72, #2a5298); 
      color: #fff; 
      padding: 1rem 2rem; 
      display: flex; 
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    header p { font-size: 1rem; color: #ddd; }

    /* Container */
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }

    /* Grid for categories/teams */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    /* Category Card */
    .category-card {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      padding: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .category-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }
    .category-card h2 {
      font-size: 1.2rem;
      margin-bottom: 0.75rem;
      color: #1e3c72;
      border-bottom: 2px solid #2a5298;
      padding-bottom: 0.3rem;
    }

    /* Driver List */
    .driver-list { list-style: none; }
    .driver-item { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0.5rem 0; 
      border-bottom: 1px solid #eee;
      transition: background 0.15s;
    }
    .driver-item:hover { background-color: #f0f4f8; }
    .driver-info { display: flex; align-items: center; gap: 0.5rem; }
    .driver-info img { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; }
    .driver-name { font-weight: 500; }
    .driver-team { font-size: 0.9rem; color: #555; }

    /* Footer */
    footer { text-align: center; padding: 2rem 1rem; font-size: 0.9rem; color: #888; }
    
    /* Responsive tweaks */
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      header p { font-size: 0.9rem; }
      .driver-info img { width: 35px; height: 35px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>The Race Pool</h1>
    <p>Your official NASCAR Cup Series team lineup</p>
  </header>

  <!-- Main Container -->
  <div class="container">
    
    <!-- Example Category Card -->
    <div class="category-grid">
      <div class="category-card">
        <h2>Scott</h2>
        <ul class="driver-list">
          <li class="driver-item">
            <div class="driver-info">
              <img src="logos/kyle-busch.png" alt="Kyle Busch Logo">
              <div>
                <div class="driver-name">Kyle Busch</div>
                <div class="driver-team">Toyota</div>
              </div>
            </div>
            <div class="driver-points">25</div>
          </li>
          <li class="driver-item">
            <div class="driver-info">
              <img src="logos/chase-elliott.png" alt="Chase Elliott Logo">
              <div>
                <div class="driver-name">Chase Elliott</div>
                <div class="driver-team">Chevrolet</div>
              </div>
            </div>
            <div class="driver-points">18</div>
          </li>
          <!-- Add other drivers here, same structure -->
        </ul>
      </div>

      <!-- Repeat Category Cards for Brenda, KO3, Pam, etc. -->
      <div class="category-card">
        <h2>Brenda</h2>
        <ul class="driver-list">
          <li class="driver-item">
            <div class="driver-info">
              <img src="logos/ross-chastain.png" alt="Ross Chastain Logo">
              <div>
                <div class="driver-name">Ross Chastain</div>
                <div class="driver-team">Chevrolet</div>
              </div>
            </div>
            <div class="driver-points">22</div>
          </li>
          <!-- Add other drivers -->
        </ul>
      </div>

      <!-- Add remaining categories the same way -->
    </div>

  </div>

  <!-- Footer -->
  <footer>
    &copy; 2026 The Race Pool. All rights reserved.
  </footer>

</body>
</html>
